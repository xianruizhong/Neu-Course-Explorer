services:
  web:
    build: .
    container_name: neu-course-explorer
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      # Mount the scraper dir so the nightly cron update is picked up live
      - ./scraper:/data:ro
    environment:
      - DB_PATH=/data/courses.db
      - WEB_DIR=/app/web
