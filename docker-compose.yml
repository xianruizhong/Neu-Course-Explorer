services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: neu_courses
      POSTGRES_USER: neu
      POSTGRES_PASSWORD: neu
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: neu-course-explorer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://neu:neu@db/neu_courses
      - WEB_DIR=/app/web
    depends_on:
      - db

volumes:
  pgdata:
