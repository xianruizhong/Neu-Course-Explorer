<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Course Explorer</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RDVLMFTNEZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RDVLMFTNEZ');
  </script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="#" class="logo" id="logo-link">
        <span class="logo-neu">NEU</span>
        <span class="logo-text">Course Explorer</span>
      </a>
      <nav class="header-nav">
        <select id="term-select" class="term-selector" title="Select term"></select>
      </nav>
    </div>
  </header>

  <!-- Home / landing view -->
  <div id="view-home" class="view active">
    <section class="hero">
      <h1>Explore Northeastern Courses</h1>
      <p class="hero-sub">Search the full course catalog with sections, enrollment, and prerequisites.</p>
      <div class="search-mode-toggle" id="search-mode-toggle">
        <button type="button" class="mode-btn active" data-mode="courses">Courses</button>
        <button type="button" class="mode-btn" data-mode="instructor">Instructor</button>
      </div>
      <form class="hero-search" id="hero-search-form">
        <input type="text" id="hero-search-input" placeholder="Search by course title, subject, or keyword…" autocomplete="off" />
        <button type="submit">Search</button>
      </form>
      <div class="subject-grid" id="subject-grid">
        <!-- populated by JS -->
      </div>
    </section>
  </div>

  <!-- Course list view -->
  <div id="view-list" class="view">
    <div class="list-layout">
      <aside class="sidebar">
        <h3>Filter</h3>
        <label for="sidebar-subject">Subject</label>
        <select id="sidebar-subject">
          <option value="">All subjects</option>
        </select>
        <label for="sidebar-search" style="margin-top:12px">Search</label>
        <input type="text" id="sidebar-search" placeholder="Keyword…" />
        <button id="sidebar-apply" class="btn-primary" style="margin-top:12px;width:100%">Apply</button>
        <button id="sidebar-clear" class="btn-ghost" style="margin-top:6px;width:100%">Clear</button>
      </aside>
      <main class="course-main">
        <div class="list-header">
          <h2 id="list-title">Courses</h2>
          <span id="list-count" class="count-badge"></span>
        </div>
        <div id="course-list" class="course-cards"></div>
        <div id="pagination" class="pagination"></div>
      </main>
    </div>
  </div>

  <!-- Instructor view -->
  <div id="view-instructor" class="view">
    <div class="detail-layout">
      <button class="back-btn" id="instructor-back-btn">← Back to courses</button>
      <div id="instructor-content"></div>
    </div>
  </div>

  <!-- Course detail view -->
  <div id="view-detail" class="view">
    <div class="detail-layout">
      <button class="back-btn" id="back-btn">← Back to courses</button>
      <div id="course-detail-content"></div>
    </div>
  </div>

  <!-- Loading / error overlays -->
  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <footer class="site-footer">
    <a href="https://xianruizhong.github.io/" target="_blank" rel="noopener noreferrer" class="footer-link">
      Xianrui Zhong
    </a>
    <span class="footer-sep">·</span>
    <a href="https://github.com/xianruizhong/Neu-Course-Explorer" target="_blank" rel="noopener noreferrer" class="footer-link footer-github-link">
      <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </footer>

  <script src="app.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
